
me: axon-backend
services:
  - name: web
    type: web
    git:
      branch: main
      build_command: ""
      run_command: ""
    docker:
      dockerfile: Dockerfile
    ports:
      - port: 3000
        path: /
    env:
      - name: NODE_ENV
        value: production
      - name: PORT
        value: "3000"
      - name: AI_DDI_SERVICE_URL
        value: http://localhost:5001
      # Add these in Koyeb dashboard:
      # MONGO_URI
      # JWT_SECRET
      # REFRESH_SECRET
      # EMAIL_HOST
      # EMAIL_PORT
      # EMAIL_USER
      # EMAIL_PASS
      # APP_URL
      # ALLOWED_ORIGINS
    instance_types:
      - type: free
