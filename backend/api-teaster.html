<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AXON API Studio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
      :root {
        --base: #1e1e2e;
        --mantle: #181825;
        --crust: #11111b;
        --surface0: #313244;
        --surface1: #45475a;
        --surface2: #585b70;
        --text: #cdd6f4;
        --subtext0: #a6adc8;
        --subtext1: #bac2de;
        --blue: #89b4fa;
        --green: #a6e3a1;
        --red: #f38ba8;
        --yellow: #f9e2af;
        --mauve: #cba6f7;
        --peach: #fab387;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Inter', sans-serif;
        background: var(--mantle);
        color: var(--text);
        height: 100vh;
        overflow: hidden;
        font-size: 14px;
      }

      /* Fixed Layout Structure */
      .app {
        display: grid;
        grid-template-columns: 280px 1fr; /* Reserves space for sidebar */
        height: 100vh;
        width: 100%;
      }

      .sidebar {
        display: flex; /* Changed from 'none' to 'flex' to keep it visible */
        background: var(--crust);
        border-right: 1px solid rgba(255,255,255,0.05);
        flex-direction: column;
        overflow: hidden;
      }

      .sidebar-header {
        padding: 24px;
        border-bottom: 1px solid rgba(255,255,255,0.04);
      }

      .logo {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: -0.03em;
      }

      .logo span { color: var(--mauve); }

      .sidebar-subtitle {
        color: var(--subtext0);
        margin-top: 6px;
        font-size: 12px;
      }

      .sidebar-search {
        padding: 16px;
        border-bottom: 1px solid rgba(255,255,255,0.04);
      }

      .search-input {
        width: 100%;
        background: var(--base);
        border: 1px solid transparent;
        color: var(--text);
        padding: 12px;
        border-radius: 12px;
        outline: none;
      }

      .groups {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
      }

      /* Session/Token Monitor Area */
      .token-monitor {
        padding: 16px;
        background: rgba(0,0,0,0.2);
        border-top: 1px solid rgba(255,255,255,0.05);
      }

      .token-status {
        display: flex;
        align-items: center;
        gap: 6px;
        color: var(--subtext0);
        font-size: 11px;
        margin-bottom: 4px;
      }

      .token-val {
        color: var(--blue);
        font-size: 10px;
        font-family: monospace;
        word-break: break-all;
      }

      .main {
        display: flex;
        flex-direction: column;
        overflow: hidden;
        min-width: 0;
      }

      .topbar {
        width: 100%;
        height: 72px;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
        background: rgba(17,17,27,0.4);
        backdrop-filter: blur(10px);
        flex-shrink: 0;
      }

      .topbar-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .language-select,
      .environment-select,
      .ghost-btn {
        background: var(--base);
        border: 1px solid rgba(255,255,255,0.06);
        color: var(--text);
        border-radius: 12px;
        padding: 10px 14px;
        outline: none;
        font-size: 12px;
        cursor: pointer;
      }

      /* Workspace Grid Fix */
      .workspace {
        flex: 1;
        overflow-y: auto;
        padding: 24px;
        display: grid;
        grid-template-columns: 1fr 1fr; /* Split Request and Response panels */
        align-items: start;
        gap: 24px;
        width: 100%;
      }

      .request-panel,
      .response-panel {
        min-width: 0;
        width: 100%;
        background: var(--base);
        border: 1px solid rgba(255,255,255,0.05);
        border-radius: 24px;
        overflow: hidden;
      }

      .panel-header {
        padding: 24px;
        border-bottom: 1px solid rgba(255,255,255,0.04);
      }

      .panel-body {
        padding: 24px;
        width: 100%;
      }

      /* Form Field Fixes for Labels and Inputs */
      .field {
        margin-bottom: 18px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .field label {
        display: block;
        color: var(--subtext0);
        font-size: 13px;
      }

      .field input,
      .field textarea {
        width: 100%;
        background: var(--mantle);
        border: 1px solid rgba(255,255,255,0.1);
        color: var(--text);
        padding: 14px;
        border-radius: 14px;
        outline: none;
      }

      .method {
        font-size: 11px;
        font-weight: 700;
        padding: 4px 8px;
        border-radius: 999px;
        min-width: 58px;
        text-align: center;
      }

      .get { background: rgba(166,227,161,0.15); color: var(--green); }
      .post { background: rgba(137,180,250,0.15); color: var(--blue); }

      .send-btn {
        width: 100%;
        border: none;
        background: var(--blue);
        color: #11111b;
        font-weight: 700;
        padding: 14px;
        border-radius: 14px;
        cursor: pointer;
        margin-top: 8px;
      }

      .json-viewer {
        width: 100%;
        background: var(--mantle);
        border-radius: 18px;
        padding: 18px;
        overflow: auto;
        font-size: 12px;
        font-family: monospace;
        white-space: pre-wrap;
        color: var(--text);
      }

      .history {
        border-top: 1px solid rgba(255,255,255,0.05);
        padding: 18px 24px;
        background: var(--crust);
        display: flex;
        align-items: center;
        gap: 12px;
        overflow-x: auto;
        min-height: 60px;
      }

      @media (max-width: 1100px) {
        .workspace { grid-template-columns: 1fr; }
      }
      /* Ensure the sidebar is ALWAYS visible and takes its 280px */
      .sidebar {
          display: flex !important;
          width: 280px;
          flex-direction: column;
      }

      /* Fix the overlapping/squashed inputs */
      .field {
          margin-bottom: 20px;
          display: flex;
          flex-direction: column;
          gap: 8px; /* Adds space between Label and Input */
      }

      .field input {
          width: 100%;
          padding: 12px;
          box-sizing: border-box; /* Prevents input from leaking out of the box */
      }
  </style>
</head>
<body>

  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">AXON <span>API Studio</span></div>
        <div class="sidebar-subtitle">Internal Developer Workspace</div>
      </div>

      <div class="sidebar-search">
        <input id="searchInput" class="search-input" placeholder="Search endpoints... (Ctrl + K)" />
      </div>

      <div class="groups" id="groups">
        </div>

      <div class="token-monitor">
        <div class="token-status" id="sessionStatus">● Session Inactive</div>
        <div class="token-val" id="tokenDisplay">No Token Stored</div>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="topbar-left">
          <h1 id="endpointTitle">Loading...</h1>
          <p>Minimal internal API workspace</p>
        </div>

        <div class="topbar-right">
          <select id="languageSelect" class="language-select">
            <option value="en">English</option>
            <option value="ar">العربية</option>
            <option value="fr">Français</option>
          </select>

          <button class="ghost-btn" onclick="refreshSession()">Refresh</button>
          <button class="ghost-btn" onclick="logout()">Logout</button>

          <select class="environment-select" id="environmentSelect">
            <option value="http://localhost:3000">Local</option>
            <option value="https://dev-api.axon.com">Development</option>
            <option value="https://api.axon.com">Production</option>
          </select>

          <button class="ghost-btn" onclick="pingAPI()">Ping</button>
        </div>
      </div>

      <section class="workspace">
        <div class="request-panel">
          <div class="panel-header">
            <div class="endpoint-path">
              <span id="endpointMethod" class="method">GET</span>
              <div id="endpointUrl" class="endpoint-url">/path</div>
            </div>
          </div>
          <div class="panel-body">
            <form id="endpointForm">
              </form>
            <button class="send-btn" onclick="sendCurrentRequest()">Send Request</button>
          </div>
        </div>

        <div class="response-panel">
          <div class="response-tabs">
            <button class="response-tab active" data-tab="body">Body</button>
            <button class="response-tab" data-tab="headers">Headers</button>
            <button class="response-tab" data-tab="status">Status</button>
            <button class="response-tab" data-tab="timing">Timing</button>
          </div>
          <div class="panel-header">
            <div class="response-meta">
              <div class="meta-pill" id="responseStatus">No Request</div>
              <div class="meta-pill" id="responseTime">0ms</div>
            </div>
          </div>
          <div class="panel-body">
            <pre id="responseViewer" class="json-viewer">{}</pre>
          </div>
        </div>
      </section>

      <div class="history" id="history">
        </div>
    </main>
  </div>

  <div class="palette" id="palette">
    <div class="palette-box">
      <input id="paletteInput" class="palette-input" placeholder="Type a command or search..." />
      <div class="palette-results" id="paletteResults"></div>
    </div>
  </div>
<script>
// Data Structure
  const endpoints = [
    {
      category: 'Auth',
      name: 'Login',
      method: 'POST',
      path: '/auth/login',
      fields: [
        { id: 'email', label: 'Email', type: 'email', placeholder: 'user@example.com' },
        { id: 'password', label: 'Password', type: 'password', placeholder: '••••••••' }
      ]
    },
    {
      category: 'Auth',
      name: 'Patient Signup',
      method: 'POST',
      path: '/auth/signup/patient',
      fields: [
        { id: 'name', label: 'Full Name', type: 'text', placeholder: 'John Doe' },
        { id: 'email', label: 'Email', type: 'email', placeholder: 'patient@example.com' },
        { id: 'password', label: 'Password', type: 'password', placeholder: '••••••••' }
      ]
    },
    {
      category: 'Auth',
      name: 'Doctor Signup',
      method: 'POST',
      path: '/auth/signup/doctor',
      fields: [
        { id: 'name', label: 'Doctor Name', type: 'text', placeholder: 'Dr. Strange' },
        { id: 'specialization', label: 'Specialization', type: 'text', placeholder: 'Cardiology' },
        { id: 'email', label: 'Email', type: 'email', placeholder: 'doctor@example.com' },
        { id: 'password', label: 'Password', type: 'password', placeholder: '••••••••' }
      ]
    },
    {
      category: 'Auth',
      name: 'Forgot Password',
      method: 'POST',
      path: '/auth/forgot-password',
      fields: [
        { id: 'email', label: 'Email', type: 'email', placeholder: 'user@example.com' }
      ]
    },
    {
      category: 'Auth',
      name: 'Reset Password',
      method: 'POST',
      path: '/auth/reset-password',
      fields: [
        { id: 'token', label: 'Reset Token', type: 'text', placeholder: 'reset-token' },
        { id: 'password', label: 'New Password', type: 'password', placeholder: '••••••••' }
      ]
    },
    {
      category: 'Users',
      name: 'Get Doctors',
      method: 'GET',
      path: '/users/doctors',
      fields: []
    },
    {
      category: 'Users',
      name: 'Get Profile',
      method: 'GET',
      path: '/users/me',
      fields: []
    },
    {
      category: 'Users',
      name: 'Search Doctors',
      method: 'GET',
      path: '/users/doctors/search',
      fields: [
        { id: 'q', label: 'Search Query', type: 'text', placeholder: 'Cardiology' }
      ]
    },
    {
      category: 'Users',
      name: 'Get Followers',
      method: 'GET',
      path: '/users/followers',
      fields: []
    },
    {
      category: 'Users',
      name: 'Get Following',
      method: 'GET',
      path: '/users/following',
      fields: []
    },
    {
      category: 'Appointments',
      name: 'Book Appointment',
      method: 'POST',
      path: '/appointments',
      fields: [
        { id: 'doctorId', label: 'Doctor ID', type: 'text', placeholder: 'doctor-id' },
        { id: 'scheduledAt', label: 'Scheduled Time', type: 'datetime-local' },
        { id: 'notes', label: 'Notes', type: 'textarea', placeholder: 'Appointment notes...' }
      ]
    },
    {
      category: 'Appointments',
      name: 'Get My Appointments',
      method: 'GET',
      path: '/appointments/my',
      fields: []
    },
    {
      category: 'Appointments',
      name: 'Get Pending',
      method: 'GET',
      path: '/appointments/pending',
      fields: []
    },
    {
      category: 'Appointments',
      name: 'Get History',
      method: 'GET',
      path: '/appointments/history',
      fields: []
    },
    {
      category: 'Chat',
      name: 'Get Conversations',
      method: 'GET',
      path: '/chat/conversations',
      fields: []
    },
    {
      category: 'Chat',
      name: 'Send Message',
      method: 'POST',
      path: '/chat/conversations/1/messages',
      fields: [
        { id: 'content', label: 'Message', type: 'textarea', placeholder: 'Hello doctor...' }
      ]
    },
    {
      category: 'Records',
      name: 'Get My Record',
      method: 'GET',
      path: '/records/me',
      fields: []
    },
    {
      category: 'Records',
      name: 'Generate QR',
      method: 'POST',
      path: '/records/qr',
      fields: []
    },
    {
      category: 'Medications',
      name: 'Get Medications',
      method: 'GET',
      path: '/medications',
      fields: []
    },
    {
      category: 'Medications',
      name: 'Pending Doses',
      method: 'GET',
      path: '/medications/pending-doses',
      fields: []
    }
  ]

  let currentEndpoint = endpoints[0]

  const groupsContainer = document.getElementById('groups')
  const endpointForm = document.getElementById('endpointForm')
  const endpointTitle = document.getElementById('endpointTitle')
  const endpointMethod = document.getElementById('endpointMethod')
  const endpointUrl = document.getElementById('endpointUrl')
  const responseViewer = document.getElementById('responseViewer')
  const responseStatus = document.getElementById('responseStatus')
  const responseTime = document.getElementById('responseTime')
  const historyContainer = document.getElementById('history')
  const tokenDisplay = document.getElementById('tokenDisplay')
  const sessionStatus = document.getElementById('sessionStatus')

  let latestResponse = {
    body: {},
    headers: {},
    status: 'Waiting',
    timing: '0ms'
  }

  // --- NEW: Initialization to load token from localStorage ---
  function initSession() {
      const token = localStorage.getItem('axon_token');
      const tokenDisplay = document.getElementById('tokenDisplay');
      const sessionStatus = document.getElementById('sessionStatus');
  
      if (token && tokenDisplay && sessionStatus) {
          tokenDisplay.textContent = `Token: ${token.substring(0, 15)}...`;
          sessionStatus.textContent = '● Session Active';
          sessionStatus.style.color = 'var(--green)';
      }
  }
  
  // Call this at the very bottom of your <script>
  initSession();
  function renderSidebar(filter = '') {
    groupsContainer.innerHTML = ''
    const grouped = {}

    endpoints.forEach(endpoint => {
      if (
        filter &&
        !endpoint.name.toLowerCase().includes(filter.toLowerCase()) &&
        !endpoint.path.toLowerCase().includes(filter.toLowerCase())
      ) {
        return
      }

      if (!grouped[endpoint.category]) {
        grouped[endpoint.category] = []
      }
      grouped[endpoint.category].push(endpoint)
    })

    Object.keys(grouped).forEach(category => {
      const group = document.createElement('div')
      group.className = 'group'
      const title = document.createElement('div')
      title.className = 'group-title'
      title.textContent = category
      group.appendChild(title)

      grouped[category].forEach(endpoint => {
        const button = document.createElement('button')
        button.className = `endpoint-item ${endpoint.name === currentEndpoint.name ? 'active' : ''}`
        button.innerHTML = `
          <span class="method ${endpoint.method.toLowerCase()}">${endpoint.method}</span>
          <span>${endpoint.name}</span>
        `
        button.onclick = () => {
          currentEndpoint = endpoint
          renderSidebar(filter)
          renderEndpoint()
        }
        group.appendChild(button)
      })
      groupsContainer.appendChild(group)
    })
  }

  function renderEndpoint() {
    endpointTitle.textContent = currentEndpoint.name
    endpointMethod.textContent = currentEndpoint.method
    endpointMethod.className = `method ${currentEndpoint.method.toLowerCase()}`
    endpointUrl.textContent = currentEndpoint.path

    endpointForm.innerHTML = ''
    currentEndpoint.fields.forEach(field => {
      const wrapper = document.createElement('div')
      wrapper.className = 'field'
      if (field.type === 'textarea') {
        wrapper.innerHTML = `<label>${field.label}</label><textarea id="${field.id}" placeholder="${field.placeholder || ''}"></textarea>`
      } else {
        wrapper.innerHTML = `<label>${field.label}</label><input type="${field.type}" id="${field.id}" placeholder="${field.placeholder || ''}" />`
      }
      endpointForm.appendChild(wrapper)
    })
  }

  async function sendCurrentRequest() {
    const baseURL = document.getElementById('environmentSelect').value
    const payload = {}
    currentEndpoint.fields.forEach(field => {
      payload[field.id] = document.getElementById(field.id)?.value
    })

    const headers = { 'Content-Type': 'application/json' }
    // Replace the old token storage line with this:
    if (data.tokens && data.tokens.accessToken) {
        localStorage.setItem('axon_token', data.tokens.accessToken);
        // Optional: store refresh token if you need it later
        localStorage.setItem('axon_refresh_token', data.tokens.refreshToken);

        // Immediately update the UI labels
        initSession();
    }
    const token = localStorage.getItem('axon_token')
    if (token) headers.Authorization = `Bearer ${token}`

    const start = performance.now()
    responseViewer.textContent = 'Loading...'

    try {
      let finalURL = `${baseURL}${currentEndpoint.path}`
      if (currentEndpoint.method === 'GET' && Object.keys(payload).length > 0) {
        const params = new URLSearchParams()
        Object.entries(payload).forEach(([key, value]) => { if (value) params.append(key, value) })
        const queryString = params.toString()
        if (queryString) finalURL += `?${queryString}`
      }

      const response = await fetch(finalURL, {
        method: currentEndpoint.method,
        headers,
        body: currentEndpoint.method === 'GET' ? undefined : JSON.stringify(payload)
      })

      let data
      try { data = await response.json() } catch { data = { message: 'No JSON response returned' } }

      const headersObject = {}
      response.headers.forEach((value, key) => { headersObject[key] = value })

      latestResponse = {
        body: data,
        headers: headersObject,
        status: { code: response.status, text: response.statusText, ok: response.ok },
        timing: `${Math.round(performance.now() - start)}ms`
      }

      responseViewer.textContent = JSON.stringify(data, null, 2)
      responseStatus.textContent = `${response.status} ${response.statusText}`
      responseTime.textContent = latestResponse.timing

      // --- Updated: Update token visibility in Sidebar UI ---
      if (data.token) {
        localStorage.setItem('axon_token', data.token)
        if (tokenDisplay) tokenDisplay.textContent = `Token: ${data.token.substring(0, 15)}...`
        if (sessionStatus) {
          sessionStatus.textContent = '● Session Active'
          sessionStatus.style.color = 'var(--green)'
        }
      }

      addToHistory(`${currentEndpoint.method} ${currentEndpoint.path}`)
    } catch (error) {
      responseStatus.textContent = 'Request Failed'
      responseViewer.textContent = JSON.stringify({ error: error.message }, null, 2)
    }
  }

  function addToHistory(text) {
    if (historyContainer.textContent.includes('No requests yet')) historyContainer.innerHTML = ''
    const item = document.createElement('div')
    item.className = 'history-item'
    item.textContent = text
    historyContainer.prepend(item)
  }

  async function pingAPI() {
    const baseURL = document.getElementById('environmentSelect').value
    try {
      const start = performance.now()
      await fetch(baseURL)
      const end = performance.now()
      responseStatus.textContent = 'API Online'
      responseTime.textContent = `${Math.round(end - start)}ms`
      responseViewer.textContent = JSON.stringify({ success: true, message: 'API is reachable' }, null, 2)
    } catch (error) {
      responseStatus.textContent = 'Offline'
      responseViewer.textContent = JSON.stringify({ success: false, error: error.message }, null, 2)
    }
  }

  document.getElementById('searchInput').addEventListener('input', e => { renderSidebar(e.target.value) })

  const palette = document.getElementById('palette')
  const paletteInput = document.getElementById('paletteInput')
  const paletteResults = document.getElementById('paletteResults')

  function openPalette() {
    palette.classList.add('active')
    paletteInput.focus()
    renderPaletteResults('')
  }

  function closePalette() { palette.classList.remove('active') }

  function renderPaletteResults(filter) {
    paletteResults.innerHTML = ''
    endpoints
      .filter(endpoint => endpoint.name.toLowerCase().includes(filter.toLowerCase()))
      .forEach(endpoint => {
        const item = document.createElement('div')
        item.className = 'palette-item'
        item.innerHTML = `<strong>${endpoint.name}</strong><div style="margin-top:6px;color:#a6adc8;font-size:12px;">${endpoint.method} ${endpoint.path}</div>`
        item.onclick = () => {
          currentEndpoint = endpoint
          renderSidebar()
          renderEndpoint()
          closePalette()
        }
        paletteResults.appendChild(item)
      })
  }

  function refreshSession() {
    const token = localStorage.getItem('axon_token')
    responseViewer.textContent = JSON.stringify({
      tokenExists: !!token,
      tokenPreview: token ? `${token.substring(0, 20)}...` : null,
      session: 'active'
    }, null, 2)
    responseStatus.textContent = 'Session Refreshed'
    initSession() // Refresh the UI labels
  }

  function logout() {
    localStorage.removeItem('axon_token')
    localStorage.removeItem('axon_refresh_token')
    if (tokenDisplay) tokenDisplay.textContent = 'No Token Stored'
    if (sessionStatus) {
      sessionStatus.textContent = '● Session Inactive'
      sessionStatus.style.color = 'var(--subtext0)'
    }
    responseViewer.textContent = JSON.stringify({ success: true, message: 'Logged out successfully' }, null, 2)
    responseStatus.textContent = 'Logged Out'
  }

  document.querySelectorAll('.response-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.response-tab').forEach(t => t.classList.remove('active'))
      tab.classList.add('active')
      const type = tab.dataset.tab
      if (type === 'body') responseViewer.textContent = JSON.stringify(latestResponse.body, null, 2)
      if (type === 'headers') responseViewer.textContent = JSON.stringify(latestResponse.headers, null, 2)
      if (type === 'status') responseViewer.textContent = JSON.stringify(latestResponse.status, null, 2)
      if (type === 'timing') responseViewer.textContent = JSON.stringify({ responseTime: latestResponse.timing }, null, 2)
    })
  })

  window.addEventListener('keydown', e => {
    if (e.ctrlKey && e.key.toLowerCase() === 'k') { e.preventDefault(); openPalette(); }
    if (e.key === 'Escape') closePalette();
  })

  paletteInput.addEventListener('input', e => { renderPaletteResults(e.target.value) })
  palette.addEventListener('click', e => { if (e.target === palette) closePalette(); })

  // Initialize
  renderSidebar()
  renderEndpoint()
  initSession()
  </script>
</body>
</html>
