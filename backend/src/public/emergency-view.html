<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emergency Medical Data</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f4f4f4;
        padding: 20px;
        color: #333;
        line-height: 1.5;
      }
      .card {
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        max-width: 500px;
        margin: 0 auto;
      }
      h1 {
        color: #d32f2f;
        margin-top: 0;
        font-size: 1.5rem;
      }
      .field {
        margin: 15px 0;
        border-bottom: 1px solid #eee;
        padding-bottom: 5px;
      }
      .offline-badge {
        display: inline-block;
        background: #ff9800;
        color: white;
        padding: 4px 10px;
        border-radius: 4px;
        font-size: 0.75rem;
        font-weight: bold;
        text-transform: uppercase;
        margin-bottom: 12px;
      }
      .emergency-btn {
        display: block;
        background: #d32f2f;
        color: white;
        text-align: center;
        padding: 18px;
        text-decoration: none;
        font-size: 1.2rem;
        font-weight: bold;
        border-radius: 8px;
        margin-top: 20px;
      }
      .muted {
        color: #888;
        font-style: italic;
      }
    </style>
    <base target="_blank" />
    <base target="_blank" />
  </head>
  <body>
    <div class="card" id="emergency-card">
      <div id="offline-indicator"></div>
      <h1 id="patient-name">Loading...</h1>
      <div class="field">
        <strong>Blood Type:</strong>
        <span id="blood-type" class="muted">—</span>
      </div>
      <div class="field">
        <strong>Conditions:</strong>
        <span id="conditions" class="muted">—</span>
      </div>
      <div class="field">
        <strong>Allergies:</strong> <span id="allergies" class="muted">—</span>
      </div>
      <div class="field">
        <strong>Emergency Contact:</strong>
        <span id="contact-name" class="muted">—</span>
      </div>
      <a class="emergency-btn" id="call-btn" href="#">CALL EMERGENCY CONTACT</a>
    </div>

    <script>
      (function () {
        function parseOfflineData() {
          const params = new URLSearchParams(window.location.search);
          const dataParam = params.get("data");
          if (!dataParam) return null;
          try {
            let base64 = dataParam.replace(/-/g, "+").replace(/_/g, "/");
            while (base64.length % 4) base64 += "=";
            const decoded = decodeURIComponent(escape(atob(base64)));
            const parts = decoded.split("|");
            return {
              bloodType: parts[0] || "Unknown",
              conditions: parts[1] || "None",
              allergies: parts[2] || "None",
            };
          } catch (e) {
            console.error("Failed to decode offline data:", e);
            return null;
          }
        }

        function renderOffline(offlineData) {
          document.getElementById("offline-indicator").innerHTML =
            '<span class="offline-badge">Offline Mode</span>';
          document.getElementById("patient-name").textContent =
            "Emergency Patient";
          document.getElementById("blood-type").textContent =
            offlineData.bloodType;
          document.getElementById("conditions").textContent =
            offlineData.conditions;
          document.getElementById("allergies").textContent =
            offlineData.allergies;
        }

        const token = window.location.pathname.split("/").pop();
        const offlineData = parseOfflineData();

        fetch("/api/v1/records/emergency-data/" + token, {
          credentials: "same-origin",
        })
          .then((r) => {
            if (!r.ok) throw new Error("Server unreachable");
            return r.json();
          })
          .then((data) => {
            const rec = data.record || data.data || {};
            const user = rec.userId || {};
            document.getElementById("patient-name").textContent =
              user.fullName || "Unknown";
            document.getElementById("blood-type").textContent =
              rec.bloodType || "—";
            document.getElementById("conditions").textContent =
              (rec.conditions || []).join(", ") || "None";
            document.getElementById("allergies").textContent =
              (rec.allergies || []).join(", ") || "None";
            const ec = rec.emergencyContact || {};
            document.getElementById("contact-name").textContent =
              (ec.name || "—") + " (" + (ec.phone || "—") + ")";
            if (ec.phone)
              document.getElementById("call-btn").href = "tel:" + ec.phone;
          })
          .catch(() => {
            if (offlineData) {
              renderOffline(offlineData);
            } else {
              document.getElementById("patient-name").textContent =
                "Unable to load data";
              document.getElementById("call-btn").style.display = "none";
            }
          });
      })();
    </script>
  </body>
</html>
